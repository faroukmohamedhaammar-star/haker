<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة الحظ الملعونة 💀</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* اهتزاز مجنون */
        @keyframes extreme-shake {
            0% { transform: translate(10px, 10px); filter: invert(100%); }
            50% { transform: translate(-10px, -20px); filter: hue-rotate(90deg); }
            100% { transform: translate(0, 0); }
        }
        .apply-horror { animation: extreme-shake 0.05s infinite; }

        #store { background: #050505; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: absolute; width: 100%; z-index: 10; color: #600; }
        #horror-screen { display: none; color: #f00; text-align: center; padding: 20px; }
        
        video, #captured-image { border: 2px solid #f00; width: 300px; filter: grayscale(100%) contrast(200%); box-shadow: 0 0 50px #f00; margin-top: 20px; }
        
        .timer-box { font-size: 150px; font-weight: bold; color: #f00; text-shadow: 0 0 40px #f00; }
        
        button { padding: 25px 60px; font-size: 22px; background: #200; color: #f00; border: 3px solid #f00; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body id="main-body">

    <div id="store">
        <h1 style="letter-spacing: 5px;">⚠️ جاري فحص الحظ...</h1>
        <button id="claim-btn">اضغط لفتح الصندوق</button>
    </div>

    <div id="horror-screen">
        <h2 style="font-size: 30px;">تـم تـحـديـد الـهـدف...</h2>
        <div class="timer-box" id="timer">3</div>
        <video id="v" autoplay playsinline></video>
        <canvas id="c" style="display:none;"></canvas>
        <img id="captured-image" style="display:none;">
    </div>

    <audio id="horror-sound">
        <source src="https://www.soundjay.com/buttons/beep-01a.mp3" type="audio/mpeg">
    </audio>

    <script>
        const claimBtn = document.getElementById('claim-btn');
        const store = document.getElementById('store');
        const horrorScreen = document.getElementById('horror-screen');
        const body = document.getElementById('main-body');
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const img = document.getElementById('captured-image');
        const timerDisplay = document.getElementById('timer');
        const sound = document.getElementById('horror-sound');

        let timeLeft = 3;

        claimBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                store.style.display = 'none';
                horrorScreen.style.display = 'block';
                body.classList.add('apply-horror');
                video.srcObject = stream;
                sound.play();

                // تصوير فوري
                setTimeout(takePhoto, 500);
                startCountdown();

            } catch (err) {
                alert("يجب تفعيل الكاميرا لبدء اللعبة!");
            }
        });

        function takePhoto() {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            img.src = canvas.toDataURL('image/png');
            img.style.display = 'inline-block';
            video.style.display = 'none';
        }

        function startCountdown() {
            const countdown = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    // قفل الموقع برمجياً (تسويد الشاشة تماماً وكأن الهاتف انطفأ)
                    document.body.innerHTML = ""; 
                    document.body.style.backgroundColor = "black";
                    // محاولة إغلاق النافذة (قد لا تعمل في كل المتصفحات لكنها تزيد التوتر)
                    window.close(); 
                }
            }, 1000);
        }
    </script>
</body>
</html>
